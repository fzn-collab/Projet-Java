# ConnectEntrepreneurs — deploiement local complet
# Usage (depuis le dossier deployment/) :
#   docker compose --profile full up --build

services:
  mongodb:
    image: mongo:7
    container_name: ce-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: connectentrepreneurs
    profiles:
      - full

  backend:
    build:
      context: ..
      dockerfile: deployment/backend/Dockerfile
    container_name: ce-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/connectentrepreneurs
      # CORS gere dans Spring Boot — autoriser http://localhost:4200
    depends_on:
      - mongodb
    profiles:
      - full

  backoffice:
    build:
      context: ..
      dockerfile: deployment/backoffice/Dockerfile
    container_name: ce-backoffice
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend
    profiles:
      - full

  # Mobile (React Native / Expo) - Development Server
  mobile:
    build:
      context: ..
      dockerfile: deployment/mobile/Dockerfile
    container_name: ce-mobile
    restart: unless-stopped
    ports:
      - "19000:19000"  # Expo
      - "19001:19001"  # Expo Web
      - "19002:19002"  # Expo DevTools
    environment:
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
      REACT_NATIVE_PACKAGER_HOSTNAME: 0.0.0.0
      API_URL: http://backend:8080/api
    depends_on:
      - backend
    profiles:
      - full

  # Backoffice seul (sans backend) — pour tester l'interface en Docker
  backoffice-standalone:
    build:
      context: ..
      dockerfile: deployment/backoffice/Dockerfile.standalone
    container_name: ce-backoffice-only
    restart: unless-stopped
    ports:
      - "4200:80"
    profiles:
      - backoffice-only

volumes:
  mongo_data:
