server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;

    # Rediriger la racine vers le frame mobile
    location = / {
        rewrite ^ /mobile-frame.html break;
    }

    # Servir les fichiers statiques d'Expo directement
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|json|map)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # L'application Expo elle-même (index.html et autres fichiers HTML)
    location /index.html {
        try_files $uri =404;
    }

    # Gestion des routes SPA (pour l'app Expo dans l'iframe)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Headers de sécurité
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
